<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Tracker</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="container">
    <header class="app-header">
        <div>
            <h1>Study Tracker</h1>
            <p>Zapisuj, ile godzin dziennie się uczysz. Cel dzienny: 3 h.</p>
            <p id="apiQuote" class="quote">Ładowanie ciekawostki...</p>
        </div>
        <button id="themeBtn" class="btn-secondary">🌓 Zmień motyw</button>
    </header>

    <section class="input-panel">
        <form id="inputForm">
            <div class="form-group">
                <label for="entryDate">Data</label>
                <input type="date" id="entryDate" required>
            </div>
            <div class="form-group">
                <label for="entryHours">Godziny nauki</label>
                <input type="number" id="entryHours" step="0.1" min="0" max="24" placeholder="np. 4.5" required>
            </div>
            <button type="submit" class="btn-action">Zapisz dzień</button>
        </form>
        <p id="formError" class="form-error"></p>
    </section>

    <div class="filters">
        <button class="btn-filter" id="btnFilterAll">Wszystko</button>
        <button class="btn-filter" id="btnFilterWeek">Ostatnie 7 dni</button>
    </div>

    <section class="kpi-row">
        <div class="kpi-box">
            <div class="label">Suma godzin</div>
            <div id="kpiTotal" class="value">0.0 h</div>
        </div>
        <div class="kpi-box">
            <div class="label">Średnia dziennie</div>
            <div id="kpiAvg" class="value">0.00 h</div>
        </div>
        <div class="kpi-box">
            <div class="label">Liczba dni</div>
            <div id="kpiDays" class="value">0</div>
        </div>
    </section>

    <div class="kpi-box chart-box">
        <canvas id="hoursChart"></canvas>
    </div>

    <section class="log-box">
        <h2>Historia wpisów</h2>
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Data</th>
                        <th>Czas nauki</th>
                        <th>Akcja</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </section>
</div>

<script src="app.js"></script>
</body>
</html>
